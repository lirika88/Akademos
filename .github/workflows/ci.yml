name: CI for Akademos

on:
  pull_request:
    branches: [ dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Show Node.js version
        run: |
          echo "✅ Pipeline запущен для PR в ветку dev"
          echo "Структура проекта:"
          ls -la
