version: '3.8'

services:
  user-service:
    image: user-service:latest
    build: ./services/user-service
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
    networks:
      - akademos-net
    environment:
      - PORT=5001

  notification-service:
    image: notification-service:latest
    build: ./services/notification-service
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
    networks:
      - akademos-net
    environment:
      - PORT=5002

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
    networks:
      - akademos-net
    depends_on:
      - user-service
      - notification-service

networks:
  akademos-net:
    external: true