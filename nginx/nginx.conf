events {
    worker_connections 1024;
}

http {
    upstream user_service {
        server user-service:5001;
    }

    upstream notification_service {
        server notification-service:5002;
    }

    server {
        listen 80;
        server_name localhost;

        # Маршрут для user-service
        location /api/users/ {
            proxy_pass http://user_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Маршрут для получения конкретного пользователя
        location ~ ^/user/([0-9]+)$ {
            proxy_pass http://user_service/user/$1;
            proxy_set_header Host $host;
        }

        # Маршрут для notification-service
        location /api/notifications/ {
            proxy_pass http://notification_service/;
            proxy_set_header Host $host;
            proxy_set_header Content-Type application/json;
        }

        # Health checks
        location /health {
            proxy_pass http://user_service/health;
            proxy_pass http://notification_service/health;
        }
    }
}